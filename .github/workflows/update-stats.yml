name: Update README stats

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours alongside the pacman job
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject username into README stats block
        run: |
          USERNAME="${{ github.repository_owner }}"

          # Replace everything between the STATS markers with fresh URLs
          python3 - <<'EOF'
          import re, os

          username = os.environ["USERNAME"]

          stats_block = f"""<!-- STATS:START -->
<div align="center">
  <img src="https://streak-stats.demolab.com?user={username}&locale=en&mode=daily&theme=dracula&hide_border=false&border_radius=5&order=3" height="150" alt="streak graph"  />
  <img src="https://github-profile-trophy.vercel.app?username={username}&theme=dracula&column=-1&row=1&margin-w=8&margin-h=8&no-bg=false&no-frame=false&order=4" height="150" alt="trophy graph"  />
</div>
<!-- STATS:END -->"""

          with open("README.md", "r") as f:
              content = f.read()

          updated = re.sub(
              r"<!-- STATS:START -->.*?<!-- STATS:END -->",
              stats_block,
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(updated)

          print(f"Stats block updated for user: {username}")
          EOF
        env:
          USERNAME: ${{ github.repository_owner }}

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update stats username [skip ci]"
          git push
